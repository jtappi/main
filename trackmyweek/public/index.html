<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackMyWeek</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div id="alertContainer" data-testid="alert-container"></div>
        <div class="d-flex justify-content-left mb-3">
            <button id="analyzeDataBtn" class="btn btn-primary mx-2">Analyze Data</button>
            <button id="viewAllDataBtn" class="btn btn-primary mx-2">View All Data</button>
            <button id="logoutBtn" class="btn btn-danger mx-2">Logout</button>
        </div>
        <div class="row equal-height">
            <div class="col-md-3">
                <div id="topItems" class="mb-3" data-testid="top-items-container"></div>
            </div>
            <div class="col-md-9">
                <div class="card p-4 d-flex flex-column">
                    <div class="form-group position-relative">
                        <input type="text" id="itemName" class="form-control" placeholder="Type something..." data-testid="item-name-input" aria-haspopup="true" aria-expanded="false">
                        <div id="suggestions" class="dropdown-menu w-100" data-testid="suggestions-dropdown"></div>
                    </div>
                    <div id="categoryButtons" data-testid="category-buttons">
                        <button class="btn btn-secondary m-1 d-flex flex-column align-items-center" data-category="Home" data-testid="category-home">
                            <i class="fas fa-home"></i>
                            <small>Home</small>
                        </button>
                        <button class="btn btn-secondary m-1 d-flex flex-column align-items-center" data-category="Medication" data-testid="category-medication">
                            <i class="fas fa-pills"></i>
                            <small>Medication</small>
                        </button>
                        <button class="btn btn-secondary m-1 d-flex flex-column align-items-center" data-category="Bill" data-testid="category-bill">
                            <i class="fas fa-file-invoice-dollar"></i>
                            <small>Bill</small>
                        </button>
                        <button class="btn btn-secondary m-1 d-flex flex-column align-items-center" data-category="Health" data-testid="category-health">
                            <i class="fas fa-heartbeat"></i>
                            <small>Health</small>
                        </button>
                        <button class="btn btn-secondary m-1 d-flex flex-column align-items-center" data-category="Pain" data-testid="category-pain">
                            <i class="fas fa-band-aid"></i>
                            <small>Pain</small>
                        </button>
                        <button class="btn btn-secondary m-1 d-flex flex-column align-items-center" data-category="Food" data-testid="category-food">
                            <i class="fas fa-utensils"></i>
                            <small>Food</small>
                        </button>
                        <button class="btn btn-secondary m-1 d-flex flex-column align-items-center" data-category="TO DO" data-testid="category-todo">
                            <i class="fas fa-tasks"></i>
                            <small>TO DO</small>
                        </button>
                        <button class="btn btn-secondary m-1 d-flex flex-column align-items-center" data-category="Exercise" data-testid="category-exercise">
                            <i class="fas fa-running"></i>
                            <small>Exercise</small>
                        </button>
                    </div>
                    <div class="form-group mt-3">
                        <div class="input-row">
                            <div class="input-group">
                                <input type="number" id="costInput" class="form-control" placeholder="Amount" disabled>
                            </div>
                            <div class="input-group">
                                <input type="number" id="caloriesInput" class="form-control" placeholder="Calories" disabled>
                            </div>
                        </div>
                    </div>
                    <div class="form-group mt-3">
                        <input type="text" id="notesInput" class="form-control" placeholder="Notes" data-testid="notes-input" disabled>
                    </div>
                    <div class="mt-auto">
                        <button id="submitBtn" class="btn btn-primary btn-block mt-3" disabled>Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editNotesModal" tabindex="-1" role="dialog" aria-labelledby="editNotesModalLabel">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editNotesModalLabel">Edit Notes</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <textarea id="editNotesText" class="form-control"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveNotesBtn">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
    <script src="navigation.js"></script>
</body>
</html>
