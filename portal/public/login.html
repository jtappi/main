<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trackmyweek — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="auth-page">
  <div class="auth-card" data-testid="login-card">
    <div class="logo" data-testid="login-logo">
      <img src="/assets/logo.png" alt="trackmyweek" class="logo-img">
      <h1>track<span>my</span>week</h1>
    </div>
    <div id="error-msg" data-testid="login-error" class="error-msg hidden"></div>
    <div class="form-group">
      <label for="identifier">Email or Username</label>
      <input
        type="text"
        id="identifier"
        data-testid="login-identifier"
        placeholder="Enter email or username"
        autocomplete="username"
      >
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        data-testid="login-password"
        placeholder="Enter password"
        autocomplete="current-password"
      >
    </div>
    <button id="login-btn" data-testid="login-submit-btn" class="btn btn-primary">Sign in</button>
    <p class="auth-divider">trackmyweek &mdash; your week, tracked.</p>
  </div>
  <script src="/assets/login.js"></script>
</body>
</html>
