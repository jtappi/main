<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trackmyweek — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="top-bar" data-testid="dashboard-header">
    <div class="brand-logo">
      <svg class="brand-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="18" width="90" height="77" rx="10" fill="#6b7f96"/>
        <rect x="5" y="28" width="90" height="67" rx="8" fill="#fff"/>
        <rect x="5" y="28" width="90" height="18" fill="#6b7f96"/>
        <rect x="25" y="10" width="10" height="20" rx="5" fill="#4fb8c4"/>
        <rect x="65" y="10" width="10" height="20" rx="5" fill="#4fb8c4"/>
        <line x1="5" y1="60" x2="95" y2="60" stroke="#d0dce8" stroke-width="2"/>
        <line x1="5" y1="76" x2="95" y2="76" stroke="#d0dce8" stroke-width="2"/>
        <line x1="32" y1="46" x2="32" y2="92" stroke="#d0dce8" stroke-width="2"/>
        <line x1="52" y1="46" x2="52" y2="92" stroke="#d0dce8" stroke-width="2"/>
        <line x1="72" y1="46" x2="72" y2="92" stroke="#d0dce8" stroke-width="2"/>
        <polyline points="22,68 34,80 58,52" stroke="#4fb8c4" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="brand">track<span>my</span>week</span>
    </div>
    <div class="top-bar-right">
      <span class="user-name" data-testid="dashboard-user-name" id="user-name"></span>
      <a href="/admin" class="btn btn-outline btn-sm hidden" data-testid="dashboard-admin-link" id="admin-link">Admin</a>
      <button id="logout-btn" data-testid="dashboard-logout-btn" class="btn btn-secondary btn-sm">Sign out</button>
    </div>
  </header>
  <main class="dashboard">
    <h2>My Projects</h2>
    <div class="project-grid" data-testid="dashboard-project-grid" id="project-grid">
      <p class="loading">Loading projects&hellip;</p>
    </div>
  </main>
  <script src="/assets/dashboard.js"></script>
</body>
</html>
