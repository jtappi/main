<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trackmyweek — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="top-bar" data-testid="admin-header">
    <div class="brand-logo">
      <svg class="brand-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="18" width="90" height="77" rx="10" fill="#6b7f96"/>
        <rect x="5" y="28" width="90" height="67" rx="8" fill="#fff"/>
        <rect x="5" y="28" width="90" height="18" fill="#6b7f96"/>
        <rect x="25" y="10" width="10" height="20" rx="5" fill="#4fb8c4"/>
        <rect x="65" y="10" width="10" height="20" rx="5" fill="#4fb8c4"/>
        <line x1="5" y1="60" x2="95" y2="60" stroke="#d0dce8" stroke-width="2"/>
        <line x1="5" y1="76" x2="95" y2="76" stroke="#d0dce8" stroke-width="2"/>
        <line x1="32" y1="46" x2="32" y2="92" stroke="#d0dce8" stroke-width="2"/>
        <line x1="52" y1="46" x2="52" y2="92" stroke="#d0dce8" stroke-width="2"/>
        <line x1="72" y1="46" x2="72" y2="92" stroke="#d0dce8" stroke-width="2"/>
        <polyline points="22,68 34,80 58,52" stroke="#4fb8c4" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="brand">track<span>my</span>week</span>
    </div>
    <div class="top-bar-right">
      <a href="/dashboard" data-testid="admin-dashboard-link" class="btn btn-secondary btn-sm">Dashboard</a>
      <button id="logout-btn" data-testid="admin-logout-btn" class="btn btn-outline btn-sm">Sign out</button>
    </div>
  </header>
  <main class="admin-panel">
    <h2>Admin Panel</h2>
    <div class="tabs" data-testid="admin-tabs">
      <button class="tab-btn active" data-tab="users" data-testid="admin-tab-users">Users</button>
      <button class="tab-btn" data-tab="projects" data-testid="admin-tab-projects">Projects</button>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="tab-content active" data-testid="admin-users-panel">
      <div class="tab-header">
        <h3>Users</h3>
        <button id="create-user-btn" data-testid="admin-create-user-btn" class="btn btn-primary btn-sm">+ Create Guest</button>
      </div>
      <div id="users-table-wrap">
        <table class="data-table" id="users-table" data-testid="admin-users-table">
          <thead>
            <tr>
              <th>Name</th><th>Email</th><th>Username</th><th>Role</th>
              <th>Active</th><th>Last Login</th><th>Project Access</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody" data-testid="admin-users-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Projects Tab -->
    <div id="tab-projects" class="tab-content" data-testid="admin-projects-panel">
      <div class="tab-header"><h3>Projects</h3></div>
      <table class="data-table" data-testid="admin-projects-table">
        <thead>
          <tr>
            <th>Icon</th><th>Name</th><th>Route</th><th>Port</th><th>Status</th><th>Description</th>
          </tr>
        </thead>
        <tbody id="projects-tbody" data-testid="admin-projects-tbody"></tbody>
      </table>
    </div>
  </main>

  <!-- Create User Modal -->
  <div id="create-user-modal" data-testid="admin-create-user-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Create Guest User</h3>
      <div id="modal-error" data-testid="admin-modal-error" class="error-msg hidden"></div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="new-name" data-testid="admin-new-name" placeholder="Full name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="new-email" data-testid="admin-new-email" placeholder="Email address">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="new-username" data-testid="admin-new-username" placeholder="Username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="new-password" data-testid="admin-new-password" placeholder="Temporary password">
      </div>
      <div class="form-group">
        <label>Project Access</label>
        <div id="new-project-access" data-testid="admin-project-access-checkboxes"></div>
      </div>
      <div class="modal-actions">
        <button id="save-user-btn" data-testid="admin-save-user-btn" class="btn btn-primary">Create User</button>
        <button id="cancel-user-btn" data-testid="admin-cancel-user-btn" class="btn btn-outline">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/assets/admin.js"></script>
</body>
</html>
