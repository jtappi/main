<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trackmyweek.com — Admin</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="admin-page">
    <header class="header">
        <div class="header-brand">
            <h1>trackmyweek<span>.com</span></h1>
            <span class="badge-admin">Admin Panel</span>
        </div>
        <div class="header-user">
            <button class="btn-secondary" onclick="window.location.href='/dashboard'">← Dashboard</button>
            <button id="logoutBtn" class="btn-logout">Sign Out</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="users">Users</button>
            <button class="tab-btn" data-tab="projects">Projects</button>
        </div>

        <!-- Users Tab -->
        <div id="tab-users" class="tab-content active">
            <div class="tab-header">
                <h2>Users</h2>
                <button class="btn-primary" id="createUserBtn">+ New Guest</button>
            </div>
            <table class="data-table" id="usersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Username</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th>Project Access</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Injected by JS -->
                </tbody>
            </table>
        </div>

        <!-- Projects Tab -->
        <div id="tab-projects" class="tab-content">
            <div class="tab-header">
                <h2>Projects</h2>
            </div>
            <table class="data-table" id="projectsTable">
                <thead>
                    <tr>
                        <th>Icon</th>
                        <th>Name</th>
                        <th>Route</th>
                        <th>Port</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="projectsTableBody">
                    <!-- Injected by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Create User Modal -->
    <div id="createUserModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Create Guest User</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="newName" placeholder="Full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="newEmail" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="newUsername" placeholder="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="newPassword" placeholder="Set a password">
            </div>
            <div id="createUserError" class="error-message" style="display:none;"></div>
            <div class="modal-actions">
                <button class="btn-secondary" id="cancelUserBtn">Cancel</button>
                <button class="btn-primary" id="saveUserBtn">Create User</button>
            </div>
        </div>
    </div>

    <script src="/assets/admin.js"></script>
</body>
</html>
