<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trackmyweek — Admin</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="top-bar">
    <div class="brand">📅 trackmyweek</div>
    <div class="top-bar-right">
      <a href="/dashboard" class="btn btn-secondary">Dashboard</a>
      <button id="logout-btn" class="btn btn-outline">Logout</button>
    </div>
  </header>
  <main class="admin-panel">
    <h2>Admin Panel</h2>
    <div class="tabs">
      <button class="tab-btn active" data-tab="users">Users</button>
      <button class="tab-btn" data-tab="projects">Projects</button>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="tab-content active">
      <div class="tab-header">
        <h3>Users</h3>
        <button id="create-user-btn" class="btn btn-primary">+ Create Guest</button>
      </div>
      <div id="users-table-wrap">
        <table class="data-table" id="users-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Username</th>
              <th>Role</th>
              <th>Active</th>
              <th>Last Login</th>
              <th>Project Access</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Projects Tab -->
    <div id="tab-projects" class="tab-content hidden">
      <div class="tab-header">
        <h3>Projects</h3>
      </div>
      <table class="data-table" id="projects-table">
        <thead>
          <tr>
            <th>Icon</th>
            <th>Name</th>
            <th>Route</th>
            <th>Port</th>
            <th>Status</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody id="projects-tbody"></tbody>
      </table>
    </div>
  </main>

  <!-- Create User Modal -->
  <div id="create-user-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Create Guest User</h3>
      <div id="modal-error" class="error-msg hidden"></div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="new-name" placeholder="Full name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="new-email" placeholder="Email address">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="new-username" placeholder="Username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="new-password" placeholder="Temporary password">
      </div>
      <div class="form-group">
        <label>Project Access</label>
        <div id="new-project-access"></div>
      </div>
      <div class="modal-actions">
        <button id="save-user-btn" class="btn btn-primary">Create User</button>
        <button id="cancel-user-btn" class="btn btn-outline">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/assets/admin.js"></script>
</body>
</html>
