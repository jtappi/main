name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Job 1: Unit & Integration Tests ──────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            portal/package-lock.json
            trackmyweek/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install portal dependencies
        run: npm ci
        working-directory: portal

      - name: Install trackmyweek dependencies
        run: npm ci
        working-directory: trackmyweek

      - name: Bootstrap data files
        run: cp core/data/users.template.json core/data/users.json

      - name: Bootstrap trackmyweek data files
        run: |
          [ -f trackmyweek/data/data.json ]       || cp trackmyweek/data/data.template.json trackmyweek/data/data.json
          [ -f trackmyweek/data/categories.json ] || cp trackmyweek/data/categories.template.json trackmyweek/data/categories.json
          [ -f trackmyweek/data/reports.json ]    || cp trackmyweek/data/reports.template.json trackmyweek/data/reports.json
          [ -f trackmyweek/data/questions.json ]  || cp trackmyweek/data/questions.template.json trackmyweek/data/questions.json

      - name: Ensure log file exists
        run: touch logs/test-runs.jsonl

      - name: Run portal unit & integration tests
        run: npm test -- --ci --forceExit --json --outputFile=/tmp/portal-jest-results.json
        working-directory: portal

      - name: Run trackmyweek unit tests
        run: npm test -- --ci --forceExit --json --outputFile=/tmp/trackmyweek-jest-results.json
        working-directory: trackmyweek

      - name: Log portal test run results
        if: always()
        run: node scripts/log-test-run.js /tmp/portal-jest-results.json --project=portal

      - name: Log trackmyweek test run results
        if: always()
        run: node scripts/log-test-run.js /tmp/trackmyweek-jest-results.json --project=trackmyweek

      - name: Commit and push test log
        if: ${{ always() && github.event_name == 'push' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/test-runs.jsonl
          git diff --staged --quiet || git commit -m "chore: log test run results [skip ci]"
          git push origin HEAD:main

  # ── Job 2: E2E Tests (Playwright) ────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            portal/package-lock.json
            trackmyweek/package-lock.json
            trackmyweek/client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install portal dependencies
        run: npm ci
        working-directory: portal

      - name: Install trackmyweek dependencies
        run: npm ci
        working-directory: trackmyweek

      - name: Install trackmyweek client dependencies
        run: npm ci
        working-directory: trackmyweek/client

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Bootstrap data files
        run: cp core/data/users.template.json core/data/users.json

      - name: Bootstrap trackmyweek data files
        run: |
          [ -f trackmyweek/data/data.json ]       || cp trackmyweek/data/data.template.json trackmyweek/data/data.json
          [ -f trackmyweek/data/categories.json ] || cp trackmyweek/data/categories.template.json trackmyweek/data/categories.json
          [ -f trackmyweek/data/reports.json ]    || cp trackmyweek/data/reports.template.json trackmyweek/data/reports.json
          [ -f trackmyweek/data/questions.json ]  || cp trackmyweek/data/questions.template.json trackmyweek/data/questions.json

      - name: Build trackmyweek client
        run: npm run build
        working-directory: trackmyweek/client

      - name: Start portal server
        run: |
          SESSION_SECRET=ci-e2e-secret NODE_ENV=production node portal/server.js &
          echo $! > /tmp/portal.pid

      - name: Wait for portal to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/login > /dev/null 2>&1; then
              echo "Portal ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Portal did not start in 30s" && exit 1

      - name: Run portal E2E tests
        run: npx playwright test --reporter=list --reporter=json --output=/tmp/portal-e2e-results.json
        continue-on-error: true

      - name: Run trackmyweek E2E tests
        run: npx playwright test --config=trackmyweek/client/playwright.ci.config.js
        continue-on-error: true

      - name: Stop portal server
        if: always()
        run: |
          if [ -f /tmp/portal.pid ]; then
            kill $(cat /tmp/portal.pid) || true
          fi

      - name: Upload portal Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-portal
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload trackmyweek Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-trackmyweek
          path: trackmyweek/client/playwright-report-tmw/
          retention-days: 7
          if-no-files-found: ignore
