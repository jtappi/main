name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Job 0: Detect changed paths ──────────────────────────────────────────
  # Only runs on pull_request. On push to main, all jobs run unconditionally
  # so the test log is always committed and the dashboard stays accurate.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      portal:      ${{ steps.filter.outputs.portal }}
      trackmyweek: ${{ steps.filter.outputs.trackmyweek }}
      ci:          ${{ steps.filter.outputs.ci }}
      scripts:     ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            portal:
              - 'portal/**'
              - 'core/**'
            trackmyweek:
              - 'trackmyweek/**'
            ci:
              - '.github/workflows/**'
            scripts:
              - 'scripts/**'

  # ── Job 1: Unit & Integration Tests ──────────────────────────────────────
  # Runs when: push to main (always), or PR touching portal/trackmyweek/ci/scripts.
  # Skipped when: PR only touches docs, markdown, or other non-code files.
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() && (
        github.event_name == 'push' ||
        needs.changes.outputs.portal      == 'true' ||
        needs.changes.outputs.trackmyweek == 'true' ||
        needs.changes.outputs.ci          == 'true' ||
        needs.changes.outputs.scripts     == 'true'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            portal/package-lock.json
            trackmyweek/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install portal dependencies
        run: npm ci
        working-directory: portal

      - name: Install trackmyweek dependencies
        run: npm ci
        working-directory: trackmyweek

      - name: Bootstrap data files
        run: cp core/data/users.template.json core/data/users.json

      - name: Bootstrap trackmyweek data files
        run: |
          [ -f trackmyweek/data/data.json ]       || cp trackmyweek/data/data.template.json trackmyweek/data/data.json
          [ -f trackmyweek/data/categories.json ] || cp trackmyweek/data/categories.template.json trackmyweek/data/categories.json
          [ -f trackmyweek/data/reports.json ]    || cp trackmyweek/data/reports.template.json trackmyweek/data/reports.json
          [ -f trackmyweek/data/questions.json ]  || cp trackmyweek/data/questions.template.json trackmyweek/data/questions.json

      - name: Ensure log file exists
        run: touch logs/test-runs.jsonl

      - name: Run portal unit & integration tests
        run: npm test -- --ci --forceExit --json --outputFile=/tmp/portal-jest-results.json
        working-directory: portal

      - name: Run trackmyweek unit tests
        run: npm test -- --ci --forceExit --json --outputFile=/tmp/trackmyweek-jest-results.json
        working-directory: trackmyweek

      - name: Log portal test run results
        if: always()
        run: node scripts/log-test-run.js /tmp/portal-jest-results.json --project=portal

      - name: Log trackmyweek test run results
        if: always()
        run: node scripts/log-test-run.js /tmp/trackmyweek-jest-results.json --project=trackmyweek

      - name: Commit and push test log
        # Runs on both push and pull_request so all Jest results appear on the dashboard.
        # See CLAUDE.md Section 12 for caveats on PR runs committing directly to main.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash -- logs/test-runs.jsonl
          git pull --rebase origin main
          git stash pop
          git add logs/test-runs.jsonl
          git diff --staged --quiet || git commit -m "chore: log test run results [skip ci]"
          git push origin HEAD:main

  # ── Job 2: E2E Tests (Playwright) ────────────────────────────────────────
  # Runs when: push to main (always), or PR touching portal/trackmyweek/ci.
  # Skipped when: PR only touches docs, markdown, scripts, or other non-code files.
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      always() && (
        github.event_name == 'push' ||
        needs.changes.outputs.portal      == 'true' ||
        needs.changes.outputs.trackmyweek == 'true' ||
        needs.changes.outputs.ci          == 'true'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            portal/package-lock.json
            trackmyweek/package-lock.json
            trackmyweek/client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install portal dependencies
        run: npm ci
        working-directory: portal

      - name: Install trackmyweek dependencies
        run: npm ci
        working-directory: trackmyweek

      - name: Install trackmyweek client dependencies
        run: npm ci
        working-directory: trackmyweek/client

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Bootstrap data files
        run: cp core/data/users.template.json core/data/users.json

      - name: Bootstrap trackmyweek data files
        run: |
          [ -f trackmyweek/data/data.json ]       || cp trackmyweek/data/data.template.json trackmyweek/data/data.json
          [ -f trackmyweek/data/categories.json ] || cp trackmyweek/data/categories.template.json trackmyweek/data/categories.json
          [ -f trackmyweek/data/reports.json ]    || cp trackmyweek/data/reports.template.json trackmyweek/data/reports.json
          [ -f trackmyweek/data/questions.json ]  || cp trackmyweek/data/questions.template.json trackmyweek/data/questions.json

      - name: Build trackmyweek client
        run: npm run build
        working-directory: trackmyweek/client

      - name: Start portal server
        run: |
          SESSION_SECRET=ci-e2e-secret NODE_ENV=production node portal/server.js &
          echo $! > /tmp/portal.pid

      - name: Wait for portal to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/login > /dev/null 2>&1; then
              echo "Portal ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Portal did not start in 30s" && exit 1

      - name: Run portal E2E tests
        id: portal-e2e
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: /tmp/portal-e2e-results.json
        run: |
          npx playwright test --reporter=list --reporter=json
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run trackmyweek E2E tests
        id: tmw-e2e
        run: |
          npx playwright test --config=trackmyweek/client/playwright.ci.config.js
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Stop portal server
        if: always()
        run: |
          if [ -f /tmp/portal.pid ]; then
            kill $(cat /tmp/portal.pid) || true
          fi

      - name: Log portal E2E results
        if: always()
        run: node scripts/log-test-run.js /tmp/portal-e2e-results.json --project=portal --type=e2e

      - name: Log trackmyweek E2E results
        if: always()
        run: node scripts/log-test-run.js /tmp/trackmyweek-e2e-results.json --project=trackmyweek --type=e2e

      - name: Commit and push E2E log
        # Runs on both push and pull_request so all E2E results appear on the dashboard.
        # See CLAUDE.md Section 12 for caveats on PR runs committing directly to main.
        # If branch protection requiring PRs is re-enabled, this step will fail for
        # pull_request events and must be updated to use a bot-bypass token instead.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash -- logs/test-runs.jsonl
          git pull --rebase origin main
          git stash pop
          git add logs/test-runs.jsonl
          git diff --staged --quiet || git commit -m "chore: log E2E test run results [skip ci]"
          git push origin HEAD:main

      - name: Upload portal Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-portal
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload trackmyweek Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-trackmyweek
          path: trackmyweek/client/playwright-report-tmw/
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail if any E2E tests failed
        if: always()
        run: |
          PORTAL_EXIT="${{ steps.portal-e2e.outputs.exit_code }}"
          TMW_EXIT="${{ steps.tmw-e2e.outputs.exit_code }}"
          if [ "$PORTAL_EXIT" != "0" ] || [ "$TMW_EXIT" != "0" ]; then
            echo "E2E tests failed - portal exit: ${PORTAL_EXIT:-n/a}  trackmyweek exit: ${TMW_EXIT:-n/a}"
            exit 1
          fi
          echo "All E2E tests passed"
