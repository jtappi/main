name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            portal/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install portal dependencies
        run: npm ci
        working-directory: portal

      - name: Bootstrap data files
        run: cp core/data/users.template.json core/data/users.json

      - name: Ensure log file exists
        run: touch logs/test-runs.jsonl

      - name: Run unit & integration tests
        run: npm test -- --ci --forceExit --json --outputFile=/tmp/jest-results.json
        working-directory: portal

      - name: Log test run results
        if: always()
        run: node scripts/log-test-run.js /tmp/jest-results.json

      - name: Commit and push test log
        if: ${{ always() && github.event_name == 'push' }}
        run: |
          echo "--- git status before add ---"
          git status
          echo "--- log file contents ---"
          cat logs/test-runs.jsonl
          echo "--- staging ---"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/test-runs.jsonl
          echo "--- git status after add ---"
          git status
          echo "--- diff staged ---"
          git diff --staged
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: log test run results [skip ci]"
            git push origin HEAD:main
            echo "Pushed successfully"
          fi
